name: Scrape course data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape all terms
        run: python3 scraper/scrape.py --out-dir data

      - name: Commit data
        # Run even if a term failed its sanity guard: successful terms still
        # land, and the red run flags the failure. Commits every run (empty
        # commit if nothing changed) so each scrape is recorded in history.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit --allow-empty -m "Scrape course data ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
