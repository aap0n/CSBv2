name: Scrape course data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape all terms
        run: python3 scraper/scrape.py --out-dir data

      - name: Commit data if changed
        # Run even if a term failed its sanity guard: successful terms still
        # land, and the red run flags the failure.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data; then
            echo "No data changes"
          else
            git add data
            git commit -m "Update course data ($(date -u +%Y-%m-%d))"
            git push
          fi
